services:
  mysql:
    image: mysql:8.4
    container_name: ife-physics-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ife_physics
      MYSQL_USER: ife_physics
      MYSQL_PASSWORD: ife_physics
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
